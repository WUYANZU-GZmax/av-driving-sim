<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动驾驶三维场景仿真 - 路网交叉口版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { margin: 0; overflow: hidden; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0f1a; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        .glass-panel { background: rgba(15,23,42,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .key-badge { display:inline-flex; align-items:center; justify-content:center; min-width:28px; height:24px; padding:0 8px; border-radius:6px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); font-size:11px; font-weight:700; }
        .metric-value { font-variant-numeric: tabular-nums; }
        .control-btn { width:56px; height:56px; border-radius:50%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; user-select:none; transition: all .1s ease; }
        .control-btn:active, .control-btn.active { background: rgba(59,130,246,0.5); transform: scale(0.95); }
        #loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#0a0f1a; z-index:50; transition: opacity .5s; }
        .spinner { width:48px; height:48px; border:3px solid rgba(255,255,255,0.1); border-top-color:#3b82f6; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .panel-toggle { cursor: pointer; user-select: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .panel-toggle .chevron { display:inline-block; transition: transform .2s ease; }
        .collapsed .panel-body { display: none; }
        .map-resize { position:absolute; left:0; bottom:0; width:18px; height:18px; cursor:nwse-resize; background:linear-gradient(135deg, transparent 0 50%, rgba(255,255,255,0.55) 50% 100%); border-bottom-left-radius:8px; }
        .map-resize:hover { background:linear-gradient(135deg, transparent 0 50%, rgba(120,180,255,0.85) 50% 100%); }
        .collapsed .panel-toggle { border-bottom: none; }
        .collapsed .panel-toggle .chevron { transform: rotate(-90deg); }
        /* Route mode UI */
        .route-panel { position:absolute; top:20px; left:50%; transform:translateX(-50%); z-index:10; }
        .route-btn { padding:6px 12px; border-radius:8px; background:rgba(59,130,246,0.2); border:1px solid rgba(59,130,246,0.35); color:#bfdbfe; font-size:11px; font-weight:600; transition:all .15s; cursor:pointer; }
        .route-btn:hover { background:rgba(59,130,246,0.35); }
        .route-btn.active { background:rgba(59,130,246,0.55); color:#fff; }
        .route-dialog-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; z-index:100; }
        .route-dialog-backdrop.hidden { display:none; }
        .route-label { position:absolute; top:0; left:0; padding:4px 8px; background:rgba(15,23,42,0.85); border:1px solid rgba(255,255,255,0.12); border-radius:6px; color:#fff; font-size:10px; line-height:1.4; pointer-events:none; transform:translate(-50%, -120%); white-space:nowrap; }
        .route-label .dist { color:#05AC42; font-weight:700; }
        .route-label .risk { color:#CF7432; }
        /* 代价信息框 / 灰色连线 / 删除途经点 */
        .route-cost { position:absolute; top:0; left:0; padding:5px 9px; border-radius:7px; font-size:10px; line-height:1.35; color:#fff; pointer-events:none; white-space:nowrap; box-shadow:0 2px 10px rgba(0,0,0,.45); }
        .route-cost.rec { background:rgba(5,172,66,.85); border:1px solid rgba(5,172,66,.95); }
        .route-cost.risk { background:rgba(207,116,50,.88); border:1px solid rgba(207,116,50,.98); }
        .route-cost .rc-dist { font-weight:700; }
        .route-cost .rc-risk { opacity:.95; margin-top:1px; }
        .route-cost.hl { outline:2px solid #fff; transform:translate(-50%,-100%) scale(1.06); }
        .route-connector { position:absolute; top:0; left:0; width:1px; background:rgba(200,208,218,.75); pointer-events:none; }
        .wp-delete { position:absolute; transform:translate(-50%,-50%); z-index:30; padding:3px 8px; border-radius:6px; background:rgba(220,38,38,.92); color:#fff; font-size:11px; font-weight:600; border:1px solid rgba(255,255,255,.35); cursor:pointer; }
        .wp-delete.hidden { display:none; }
        /* Toast 标题 + 详情 */
        .toast { position:absolute; bottom:120px; left:50%; transform:translateX(-50%); max-width:360px; padding:9px 16px; background:rgba(15,23,42,0.92); color:#fff; border-radius:8px; font-size:12px; border:1px solid rgba(255,255,255,0.12); opacity:0; transition:opacity .3s; pointer-events:none; z-index:60; text-align:center; }
        .toast.show { opacity:1; }
        .toast-title { font-weight:700; font-size:12px; }
        .toast-detail { font-size:11px; opacity:.85; margin-top:2px; }
        /* 确认弹窗按推荐/风险着色 */
        .route-dialog-backdrop.rec .glass-panel { border:1px solid #05AC42; }
        .route-dialog-backdrop.risk .glass-panel { border:1px solid #CF7432; }
    </style>
</head>
<body>
    <div id="loading"><div class="flex flex-col items-center gap-4"><div class="spinner"></div><div class="text-white/70 text-sm tracking-wider">正在加载仿真场景...</div></div></div>
    <div id="canvas-container"></div>

    <div id="panel-info" class="absolute top-5 left-5 z-10 collapsed">
        <div class="glass-panel rounded-xl overflow-hidden text-white">
            <button class="panel-toggle w-full flex items-center justify-between px-4 py-2.5 hover:bg-white/10 transition" onclick="togglePanel('panel-info')">
                <span class="flex items-center gap-2 text-sm font-bold tracking-wide"><span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>AUTONOMOUS DRIVING SIM</span>
                <span class="chevron text-white/60">▾</span>
            </button>
            <div class="panel-body p-4">
                <div class="grid grid-cols-2 gap-3 text-xs">
                    <div class="bg-white/5 rounded-lg p-2"><div class="text-white/50 mb-1">车速</div><div class="text-lg font-bold metric-value"><span id="speed">0</span> <span class="text-xs font-normal text-white/50">km/h</span></div></div>
                    <div class="bg-white/5 rounded-lg p-2"><div class="text-white/50 mb-1">油门</div><div class="text-lg font-bold metric-value"><span id="throttle">0</span><span class="text-xs font-normal text-white/50">%</span></div></div>
                    <div class="bg-white/5 rounded-lg p-2"><div class="text-white/50 mb-1">方向盘</div><div class="text-lg font-bold metric-value"><span id="steering">0</span><span class="text-xs font-normal text-white/50">°</span></div></div>
                    <div class="bg-white/5 rounded-lg p-2"><div class="text-white/50 mb-1">挡位</div><div class="text-lg font-bold metric-value" id="gear">D</div></div>
                </div>
                <div class="mt-3 pt-3 border-t border-white/10">
                    <div class="text-xs text-white/40 mb-2">键盘控制</div>
                    <div class="flex flex-wrap gap-2 text-[10px]">
                        <span class="key-badge">W</span><span class="text-white/60">加速</span>
                        <span class="key-badge">S</span><span class="text-white/60">刹车/倒车</span>
                        <span class="key-badge">A</span><span class="text-white/60">左转</span>
                        <span class="key-badge">D</span><span class="text-white/60">右转</span>
                        <span class="key-badge">Space</span><span class="text-white/60">手刹</span>
                        <span class="key-badge">R</span><span class="text-white/60">重置</span>
                        <span class="key-badge">C</span><span class="text-white/60">视角</span>
                        <span class="key-badge">拖拽</span><span class="text-white/60">旋转</span>
                        <span class="key-badge">滚轮</span><span class="text-white/60">缩放</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-map" class="absolute top-5 right-5 z-10 collapsed">
        <div class="glass-panel rounded-xl overflow-hidden">
            <button class="panel-toggle w-full flex items-center justify-between px-3 py-2 hover:bg-white/10 transition text-white text-xs font-semibold" onclick="togglePanel('panel-map')">
                <span>🗺 小地图</span><span class="chevron text-white/60">▾</span>
            </button>
            <div class="panel-body" style="position:relative;"><canvas id="map-canvas" width="220" height="220"></canvas><div id="map-resize" class="map-resize" title="拖拽左下角调整小地图大小"></div></div>
        </div>
    </div>

    <div id="panel-controls" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-10 collapsed">
        <div class="glass-panel rounded-2xl overflow-hidden">
            <button class="panel-toggle w-full flex items-center justify-center gap-2 px-4 py-2 hover:bg-white/10 transition text-white text-xs font-semibold" onclick="togglePanel('panel-controls')">
                <span>🎮 控制面板</span><span class="chevron text-white/60">▾</span>
            </button>
            <div class="panel-body p-4">
                <div class="flex items-center gap-4">
                    <div class="grid grid-cols-3 gap-2">
                        <div></div><button class="control-btn" id="btn-up">▲</button><div></div>
                        <button class="control-btn" id="btn-left">◀</button><button class="control-btn" id="btn-down">▼</button><button class="control-btn" id="btn-right">▶</button>
                    </div>
                    <div class="h-10 w-px bg-white/10"></div>
                    <div class="flex flex-col gap-2">
                        <button id="btn-reset" class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-white text-xs font-semibold transition">重置位置</button>
                        <button id="btn-view" class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-white text-xs font-semibold transition">切换视角</button>
                    </div>
                    <div class="h-10 w-px bg-white/10"></div>
                    <div class="text-xs text-white/60 leading-relaxed">
                        <div>传感器预览</div>
                        <div class="flex items-center gap-2 mt-1">
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="toggle-lidar" class="accent-blue-500"><span>LiDAR 环</span></label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="toggle-box" checked class="accent-blue-500"><span>目标框</span></label>
                        </div>
                        <div class="mt-2">车辆显示</div>
                        <div class="flex items-center gap-2 mt-1">
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="toggle-solid" checked class="accent-blue-500"><span>实体车辆</span></label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 路线模式入口 / 状态 -->
    <div id="panel-route" class="route-panel">
        <div class="glass-panel rounded-2xl overflow-hidden">
            <div class="px-4 py-2.5 border-b border-white/10 flex items-center justify-between gap-4">
                <span class="text-white text-xs font-semibold">🚩 路线模式</span>
                <span id="route-status" class="text-white/60 text-xs">未启动</span>
            </div>
            <div class="p-3 flex items-center gap-2">
                <button id="btn-change-lane" class="route-btn">换车道 (L)</button>
                <button id="btn-new-dest" class="route-btn">新设终点 (N / Shift+左键)</button>
                <button id="btn-exit-route" class="px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 text-white text-xs font-semibold transition">退出 (Esc)</button>
            </div>
        </div>
    </div>

    <!-- 路线确认弹窗 -->
    <div id="route-dialog" class="route-dialog-backdrop hidden">
        <div class="glass-panel rounded-xl p-5 max-w-sm w-full text-white mx-4">
            <h3 class="text-sm font-bold mb-3">确认该路线</h3>
            <div class="text-xs text-white/70 mb-4 space-y-1">
                <div>距离：<span id="dialog-dist" class="text-white font-semibold"></span></div>
                <div id="dialog-risk-row" class="hidden text-orange-400">风险：<span id="dialog-risk"></span></div>
            </div>
            <div class="space-y-2 mb-4">
                <label class="flex items-center gap-2 text-xs text-white/80 cursor-pointer"><input type="checkbox" id="opt-pickup" class="accent-blue-500"> 加 Pickup fence</label>
                <label class="flex items-center gap-2 text-xs text-white/80 cursor-pointer"><input type="checkbox" id="opt-blacklist" class="accent-blue-500"> 软化 Blacklist</label>
            </div>
            <div class="flex gap-2">
                <button id="dialog-confirm" class="flex-1 py-2 rounded-lg bg-green-600/80 hover:bg-green-600 text-white text-xs font-semibold transition">确认并下发</button>
                <button id="dialog-cancel" class="flex-1 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-white text-xs font-semibold transition">取消</button>
            </div>
        </div>
    </div>

    <!-- 路线指标面板 -->
    <div id="panel-metrics" class="absolute top-20 left-5 z-10 collapsed">
        <div class="glass-panel rounded-xl overflow-hidden text-white">
            <button class="panel-toggle w-full flex items-center justify-between px-4 py-2 hover:bg-white/10 transition" onclick="togglePanel('panel-metrics')">
                <span class="text-xs font-semibold">📊 路线指标</span><span class="chevron text-white/60">▾</span>
            </button>
            <div class="panel-body p-3 text-xs space-y-2">
                <div class="flex justify-between"><span class="text-white/60">模式进入</span><span id="m-mode-enter">-</span></div>
                <div class="flex justify-between"><span class="text-white/60">选点耗时</span><span id="m-waypoint-dt">-</span></div>
                <div class="flex justify-between"><span class="text-white/60">选路耗时</span><span id="m-route-dt">-</span></div>
                <div class="flex justify-between"><span class="text-white/60">下发耗时</span><span id="m-dispatch-dt">-</span></div>
                <div class="flex justify-between"><span class="text-white/60">候选路线数</span><span id="m-route-count">-</span></div>
                <div class="flex justify-between"><span class="text-white/60">推荐路线数</span><span id="m-rec-count">-</span></div>
                <button id="btn-export-metrics" class="w-full mt-2 py-1.5 rounded bg-white/10 hover:bg-white/20 text-white transition">导出 JSON</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <!-- 删除途经点按钮 -->
    <button id="wp-delete" class="wp-delete hidden">✕ 删除途经点</button>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ============ SCENE ============
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0f1a);
        scene.fog = new THREE.FogExp2(0x0a0f1a, 0.0022);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        container.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.35, 0.5, 0.85);
        composer.addPass(bloomPass);

        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.08;
        orbitControls.enablePan = false;
        orbitControls.minDistance = 6;
        orbitControls.maxDistance = 320;
        orbitControls.maxPolarAngle = Math.PI / 2 - 0.04; // 不让相机钻到地面以下

        // ============ LIGHTS ============
        scene.add(new THREE.AmbientLight(0x4a5a7a, 0.6));
        scene.add(new THREE.HemisphereLight(0x87ceeb, 0x2a2a3a, 0.5));
        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.4);
        sunLight.position.set(120, 180, -60);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(4096, 4096);
        sunLight.shadow.camera.near = 1; sunLight.shadow.camera.far = 600;
        sunLight.shadow.camera.left = -300; sunLight.shadow.camera.right = 300;
        sunLight.shadow.camera.top = 300; sunLight.shadow.camera.bottom = -300;
        sunLight.shadow.bias = -0.0002;
        scene.add(sunLight);

        // ============ TEXTURES ============
        function createAsphaltTexture() {
            const c = document.createElement('canvas'); c.width = 512; c.height = 512;
            const ctx = c.getContext('2d'); ctx.fillStyle = '#2a2a2e'; ctx.fillRect(0,0,512,512);
            for (let i=0;i<40000;i++){ const x=Math.random()*512,y=Math.random()*512,s=Math.random()*2,g=30+Math.random()*25; ctx.fillStyle=`rgb(${g},${g},${g+2})`; ctx.fillRect(x,y,s,s); }
            const t = new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=16; return t;
        }
        function createNoiseTexture() {
            const c = document.createElement('canvas'); c.width=256; c.height=256;
            const ctx = c.getContext('2d'); ctx.fillStyle='#404040'; ctx.fillRect(0,0,256,256);
            for (let i=0;i<8000;i++){ ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.08})`; ctx.fillRect(Math.random()*256,Math.random()*256,1.5,1.5); }
            const t = new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
        }
        const asphaltTex = createAsphaltTexture();
        const concreteTex = createNoiseTexture();

        function createLineTexture(dashed) {
            const c = document.createElement('canvas'); c.width=64; c.height=512; const ctx=c.getContext('2d');
            ctx.fillStyle='rgba(0,0,0,0)'; ctx.fillRect(0,0,64,512); ctx.fillStyle='#e8e8e8';
            if (dashed) for (let i=0;i<512;i+=64) ctx.fillRect(22,i+12,20,40); else ctx.fillRect(22,0,20,512);
            const t = new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=16; return t;
        }
        const dashedTex = createLineTexture(true);
        const solidTex = createLineTexture(false);

        // ============ ROAD NETWORK ============
        const ROAD_WIDTH = 24, LANE_COUNT = 4, LANE_WIDTH = ROAD_WIDTH / LANE_COUNT;
        const HALF = ROAD_WIDTH / 2;
        const MAIN_Z_HALF = 480;            // 主路沿 Z 轴： -480 .. 480
        const CROSS_X_HALF = 180;           // 交叉路沿 X 轴： -180 .. 180
        const INTERSECTIONS = [-375,-225,-75,75,225,375];  // 6 个十字路口（原有 2 个 + 扩展 4 个）

        const roadGroup = new THREE.Group(); scene.add(roadGroup);

        const asphaltMat = new THREE.MeshStandardMaterial({ map: asphaltTex, roughness:0.85, metalness:0.1, color:0x333338 });
        asphaltTex.repeat.set(1, 6);
        const sidewalkMat = new THREE.MeshStandardMaterial({ map: concreteTex, color:0x555560, roughness:0.9, metalness:0.05 });
        concreteTex.repeat.set(20, 20);

        // 主路面
        const mainRoad = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH, MAIN_Z_HALF*2), asphaltMat);
        mainRoad.rotation.x = -Math.PI/2; mainRoad.receiveShadow = true; roadGroup.add(mainRoad);
        // 两条交叉路
        INTERSECTIONS.forEach(zc => {
            const cr = new THREE.Mesh(new THREE.PlaneGeometry(CROSS_X_HALF*2, ROAD_WIDTH), asphaltMat.clone());
            cr.rotation.x = -Math.PI/2; cr.position.set(0, 0.002, zc); cr.receiveShadow = true; roadGroup.add(cr);
        });

        // 人行道
        const sideGeo = new THREE.PlaneGeometry(10, MAIN_Z_HALF*2);
        [-1,1].forEach(s => {
            const sw = new THREE.Mesh(sideGeo, sidewalkMat.clone());
            sw.rotation.x=-Math.PI/2; sw.position.set(s*(HALF+5),0.05,0); sw.receiveShadow=true; roadGroup.add(sw);
            INTERSECTIONS.forEach(zc=>{ const csw=new THREE.Mesh(new THREE.PlaneGeometry(CROSS_X_HALF*2,10),sidewalkMat.clone()); csw.rotation.x=-Math.PI/2; csw.position.set(0,0.05,s*(HALF+5)+zc); csw.receiveShadow=true; roadGroup.add(csw); });
        });
        // 路缘石
        const curbMat = new THREE.MeshStandardMaterial({ color:0x888899, roughness:0.8 });
        const curbGeo = new THREE.BoxGeometry(0.4,0.15,MAIN_Z_HALF*2);
        [-1,1].forEach(s=>{ const c=new THREE.Mesh(curbGeo,curbMat); c.position.set(s*(HALF+0.2),0.075,0); c.receiveShadow=true; c.castShadow=true; roadGroup.add(c); });
        const curbGeoX = new THREE.BoxGeometry(CROSS_X_HALF*2,0.15,0.4);
        INTERSECTIONS.forEach(zc=>{ [-1,1].forEach(s=>{ const c=new THREE.Mesh(curbGeoX,curbMat); c.position.set(0,0.075,s*(HALF+0.2)+zc); roadGroup.add(c); }); });

        // 车道线工具
        function laneLine(axis, fixed, start, end, dashed, color) {
            const len = end - start; if (len <= 0.1) return;
            const tex = (dashed?dashedTex:solidTex).clone(); tex.needsUpdate=true; tex.repeat.set(1, Math.max(1, len/6));
            const mat = new THREE.MeshStandardMaterial({ map:tex, transparent:true, roughness:0.6 });
            if (color){ mat.color.setHex(color); mat.emissive.setHex(color); mat.emissiveIntensity=0.15; }
            const geo = axis==='z' ? new THREE.PlaneGeometry(0.18,len) : new THREE.PlaneGeometry(len,0.18);

        // ============ CAMERA (orbit 始终可用) ============

        let lightTimer=0;

        // ============ MINI MAP（高德简化风） ============
        const mapCanvas=document.getElementById('map-canvas'); const mapCtx=mapCanvas.getContext('2d');

        let mapZoom = 1;                                  // 1 = 完整路网；滚轮可放大/缩小
        const mscale = ()=> Math.min(MAP_W/WORLD_W, MAP_H/WORLD_H)*mapZoom;
        // 以自车为中心（高德导航视角）：世界坐标 -> 画布像素
        const w2mx = x => MAP_W/2 + (x - carState.x)*mscale();

        // 小地图滚轮缩放
        mapCanvas.addEventListener('wheel', e=>{ e.preventDefault(); mapZoom *= (e.deltaY<0?1.15:1/1.15); mapZoom=Math.max(0.6,Math.min(6,mapZoom)); }, {passive:false});
        // 小地图拖拽改变尺寸（左下角手柄：向左下拉大）

        window.addEventListener('mousemove', e=>{ if(!mapResizing) return; let nw=mapStartW-(e.clientX-mapStartX); let nh=mapStartH+(e.clientY-mapStartY); nw=Math.max(150,Math.min(560,nw)); nh=Math.max(150,Math.min(560,nh)); mapCanvas.width=nw; mapCanvas.height=nh; MAP_W=nw; MAP_H=nh; });

        function drawRoadBand(x0,z0,x1,z1){ const a=w2mx(x0),b=w2mz(z0),c=w2mx(x1),d=w2mz(z1); mapCtx.fillRect(Math.min(a,c),Math.min(b,d),Math.abs(c-a),Math.abs(d-b)); }
        function drawLaneLines(){
            // 主路纵向车道线（沿 Z），避开路口
            const xs=[-LANE_WIDTH,0,LANE_WIDTH]; let cursor=-MAIN_Z_HALF; const segZ=[];
            INTERSECTIONS.slice().sort((a,b)=>a-b).forEach(zc=>{ segZ.push([cursor,zc-HALF]); cursor=zc+HALF; }); segZ.push([cursor,MAIN_Z_HALF]);
            xs.forEach(x=>{ segZ.forEach(([z0,z1])=>{ mapCtx.beginPath(); mapCtx.moveTo(w2mx(x),w2mz(z0)); mapCtx.lineTo(w2mx(x),w2mz(z1)); mapCtx.stroke(); }); });
            // 交叉路横向车道线（沿 X），避开主路
            INTERSECTIONS.forEach(zc=>{ [-LANE_WIDTH,0,LANE_WIDTH].forEach(zoff=>{ const mz=w2mz(zc+zoff); mapCtx.beginPath(); mapCtx.moveTo(w2mx(-CROSS_X_HALF),mz); mapCtx.lineTo(w2mx(-HALF),mz); mapCtx.stroke(); mapCtx.beginPath(); mapCtx.moveTo(w2mx(HALF),mz); mapCtx.lineTo(w2mx(CROSS_X_HALF),mz); mapCtx.stroke(); }); });
        }
        function drawMiniMap(){
            const ctx=mapCtx, w=MAP_W, h=MAP_H;
            ctx.clearRect(0,0,w,h);
            // 背景（高德浅色）
            ctx.fillStyle='#e9edf0'; ctx.fillRect(0,0,w,h);

            INTERSECTIONS.forEach(zc=> drawRoadBand(-CROSS_X_HALF,zc-HALF,CROSS_X_HALF,zc+HALF));
            // 路面（白色）
            ctx.fillStyle='#ffffff';
            drawRoadBand(-HALF+1.2,-MAIN_Z_HALF,HALF-1.2,MAIN_Z_HALF);
            INTERSECTIONS.forEach(zc=> drawRoadBand(-CROSS_X_HALF,zc-HALF+1.2,CROSS_X_HALF,zc+HALF-1.2));
            // 车道线（细浅色虚线）

            // 建筑（浅灰块）
            ctx.fillStyle='#d3d9df';
            buildingPositions.forEach(b=>{ const bx=w2mx(b.x-b.w/2), bz=w2mz(b.z-b.d/2), bw=b.w*mscale(), bd=b.d*mscale(); if(bx+bw<0||bz+bd<0||bx>w||bz>h) return; ctx.fillRect(bx,bz,bw,bd); });
            // 交通车
            trafficCars.forEach(car=>{ const mx=w2mx(car.mesh.position.x), mz=w2mz(car.mesh.position.z); ctx.fillStyle=car.cross?'#f59e0b':'#3b82f6'; ctx.fillRect(mx-1.2,mz-1.6,2.4,3.2); });
            // 自车（红色箭头，朝向行进方向）
            const ex=w2mx(carState.x), ez=w2mz(carState.z);

            ctx.fillStyle='#e11d48'; ctx.beginPath(); ctx.moveTo(0,6); ctx.lineTo(-4,-5); ctx.lineTo(0,-2); ctx.lineTo(4,-5); ctx.closePath(); ctx.fill();
            ctx.restore();
            // 缩放级别提示
            ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.font='9px Inter, sans-serif'; ctx.fillText('x'+mapZoom.toFixed(1), 4, h-4);

        // ============ ROUTE SELECTION SYSTEM (RA 插旗子重构) ============
        const ROUTE = {
            mode: 'NONE', status: 'idle', // idle | selectingDestination | selectingWaypoint | selectingRoute | confirmed
            drivableArea: null, waypoint: null, destination: null,
            routes: [], selectedRoute: null, hoveredRoute: null,
            routeGroup: new THREE.Group(), labelGroup: [],
            autoDrive: false, autoPath: [], autoIndex: 0, autoProgress: 0,
            events: [], graph: null, excludedLane: null,
            startTime: 0, waypointTime: 0, routeSelectTime: 0, dispatchTime: 0
        };
        scene.add(ROUTE.routeGroup);

        function rdistance(a,b){ const dx=a.x-b.x, dz=a.z-b.z; return Math.sqrt(dx*dx+dz*dz); }
        function rformatDistance(m){ if (m<1000) return Math.round(m)+'m'; return (m/1000).toFixed(2)+'km'; }

        // ---- Road graph ----
        function buildRoadGraph(){
            const nodes=[], edges=[];
            const step=20;
            const add=(x,z,meta)=>{ nodes.push({x,z,idx:nodes.length,...meta}); return nodes.length-1; };
            const mainIds=[];
            for (let lane=0; lane<LANE_COUNT; lane++){
                const x=-HALF+lane*LANE_WIDTH+LANE_WIDTH/2; const laneIds=[];
                for (let z=-MAIN_Z_HALF; z<=MAIN_Z_HALF+0.1; z+=step) laneIds.push(add(x,z,{lane,axis:'z'}));
                mainIds.push(laneIds);
            }
            const crossIds=[];
            INTERSECTIONS.forEach((zc,zi)=>{
                const perZc=[];
                for (let lane=0; lane<LANE_COUNT; lane++){
                    const z=zc-HALF+lane*LANE_WIDTH+LANE_WIDTH/2; const laneIds=[];
                    for (let x=-CROSS_X_HALF; x<=CROSS_X_HALF+0.1; x+=step) laneIds.push(add(x,z,{lane,axis:'x',zc}));
                    perZc.push(laneIds);
                }
                crossIds.push(perZc);
            });
            mainIds.forEach(laneIds=>{ for (let i=0;i<laneIds.length-1;i++) edges.push([laneIds[i],laneIds[i+1],rdistance(nodes[laneIds[i]],nodes[laneIds[i+1]])]); });
            crossIds.forEach(perZc=>{ perZc.forEach(laneIds=>{ for (let i=0;i<laneIds.length-1;i++) edges.push([laneIds[i],laneIds[i+1],rdistance(nodes[laneIds[i]],nodes[laneIds[i+1]])]); }); });
            mainIds.forEach((laneIds,lane)=>{
                INTERSECTIONS.forEach((zc,zi)=>{
                    let best=-1, bestD=Infinity;
                    laneIds.forEach(idx=>{ const d=Math.abs(nodes[idx].z-zc); if (d<bestD){bestD=d; best=idx;} });
                    if (best===-1) return;
                    crossIds[zi].forEach(crossLaneIds=>{
                        crossLaneIds.forEach(idx=>{
                            if (Math.abs(nodes[idx].x)<HALF+0.5 && Math.abs(nodes[idx].z-zc)<HALF+0.5){
                                const d=rdistance(nodes[best],nodes[idx]); edges.push([best,idx,d]); edges.push([idx,best,d]);
                            }
                        });
                    });
                });
            });
            const adj=nodes.map(()=>[]); edges.forEach(([u,v,w])=>{ adj[u].push([v,w]); adj[v].push([u,w]); });
            return {nodes,adj};
        }
        ROUTE.graph=buildRoadGraph();

        function snapToGraph(x,z){
            let best=-1, bestD=Infinity;
            ROUTE.graph.nodes.forEach((n,i)=>{ const d=(n.x-x)*(n.x-x)+(n.z-z)*(n.z-z); if (d<bestD){bestD=d; best=i;} });
            return best;
        }
        function dijkstra(startIdx,endIdx){
            const n=ROUTE.graph.nodes.length; const dist=new Float32Array(n).fill(Infinity); const prev=new Int32Array(n).fill(-1); const vis=new Uint8Array(n);
            dist[startIdx]=0;
            for (let iter=0; iter<n; iter++){
                let u=-1; for (let i=0;i<n;i++) if (!vis[i] && (u===-1 || dist[i]<dist[u])) u=i;
                if (u===-1 || dist[u]===Infinity) break; vis[u]=1; if (u===endIdx) break;
                ROUTE.graph.adj[u].forEach(([v,w])=>{ if (dist[u]+w<dist[v]){ dist[v]=dist[u]+w; prev[v]=u; } });
            }
            const path=[]; let cur=endIdx; while (cur!==-1){ path.unshift(ROUTE.graph.nodes[cur]); cur=prev[cur]; }
            return path;
        }
        function pathLength(path){ let s=0; for (let i=1;i<path.length;i++) s+=rdistance(path[i-1],path[i]); return s; }
        function crossesCenterLine(path){
            let side=null; for (let i=0;i<path.length;i++){ if (path[i].axis!=='z') continue; const s=path[i].lane<2?'left':'right'; if (side===null) side=s; else if (side!==s) return true; }
            return false;
        }
        function generateRoutes(){
            const startNodeIdx=snapToGraph(carState.x,carState.z);
            const wp=ROUTE.waypoint.userData;
            const wpIdx=wp.graphNode;
            let destIdx;
            if (ROUTE.mode==='LANE'){
                const lane=Math.min(LANE_COUNT-1, Math.max(0, Math.round((carState.x+HALF)/LANE_WIDTH-0.5)));
                const x=-HALF+lane*LANE_WIDTH+LANE_WIDTH/2; const z=carState.z+400;
                destIdx=snapToGraph(x,z);
            } else {
                destIdx=snapToGraph(ROUTE.destination.x,ROUTE.destination.z);
            }
            if (startNodeIdx===-1 || wpIdx===-1 || destIdx===-1){ ROUTE.routes=[]; return; }

            // 起点候选：当前车道 + 同向前方相邻车道（排除本行程已走过的车道，见 story 8）
            const startVariants=[startNodeIdx];
            const startNode=ROUTE.graph.nodes[startNodeIdx];
            if (startNode.axis==='z') for (let lane=0;lane<LANE_COUNT;lane++){ if (lane===startNode.lane) continue; if (lane===ROUTE.excludedLane) continue; const x=-HALF+lane*LANE_WIDTH+LANE_WIDTH/2; const idx=snapToGraph(x,startNode.z); if (idx!==-1 && !startVariants.includes(idx)) startVariants.push(idx); }
            const destVariants=[destIdx];
            const destNode=ROUTE.graph.nodes[destIdx];
            if (destNode.axis==='z') for (let lane=0;lane<LANE_COUNT;lane++){ if (lane===destNode.lane) continue; const x=-HALF+lane*LANE_WIDTH+LANE_WIDTH/2; const idx=snapToGraph(x,destNode.z); if (idx!==-1 && !destVariants.includes(idx)) destVariants.push(idx); }

            const straight=rdistance(carState, wp.pos);
            const candidates=[]; let id=0;
            startVariants.forEach(s=>{
                destVariants.forEach(d=>{
                    const p1=dijkstra(s,wpIdx); const p2=dijkstra(wpIdx,d);
                    if (p1.length<2 || p2.length<2) return;
                    const leg1=pathLength(p1);
                    // PRD 过滤规则：仅针对「ADV 到达途径点」这段，路线距离 > 直距×3+100m 视为极端绕路不展示
                    if (leg1 > straight*3+100) return;
                    const path=p1.concat(p2.slice(1));
                    const dist=leg1+pathLength(p2);
                    candidates.push({path,dist,leg1,id:id++,recommended:false,risks:[]});
                });
            });
            // 去重 + 限量 ≤5
            candidates.sort((a,b)=>a.dist-b.dist);
            const seen=new Set(), unique=[];
            candidates.forEach(r=>{ const key=r.path.map(p=>p.idx).join(','); if (!seen.has(key)){ seen.add(key); unique.push(r); } });
            const final=unique.slice(0,5);
            if (final.length>0){
                const avg=final.reduce((s,r)=>s+r.dist,0)/final.length;
                final.forEach(r=>{
                    r.risks=[];
                    if (r.dist>avg*1.2) r.risks.push('路线过长');
                    if (crossesCenterLine(r.path)) r.risks.push('压实线变道');
                    if (hasUTurn(r.path)) r.risks.push('违反车道导向');
                    r.recommended = r.risks.length===0;
                });
            }
            ROUTE.routes=final;
            logEvent('route_generate',{count:final.length,distances:final.map(r=>Math.round(r.dist)),recommended:final.map(r=>r.recommended)});
        }
        // 行进方向出现明显反向（调头）视为违反车道导向
        function hasUTurn(path){
            let prevDir=null, rev=0;
            for (let i=1;i<path.length;i++){
                const dx=path[i].x-path[i-1].x, dz=path[i].z-path[i-1].z; const len=Math.hypot(dx,dz); if (len<1e-3) continue;
                const dir=Math.atan2(dx,dz);
                if (prevDir!==null){ let diff=Math.abs(dir-prevDir); if (diff>Math.PI) diff=2*Math.PI-diff; if (diff>Math.PI*0.85) rev++; }
                prevDir=dir;
            }
            return rev>=2;
        }

        // ---- Drivable area ----
        function getDrivableWorldPolygon(){
            const fwd=100, back=50, side=100;
            const cos=Math.cos(carState.rotation), sin=Math.sin(carState.rotation);
            const localToWorld=(lx,lz)=>({x:carState.x+lx*cos+lz*sin, z:carState.z-lx*sin+lz*cos});
            return [localToWorld(-side,fwd), localToWorld(side,fwd), localToWorld(side,-back), localToWorld(-side,-back)];
        }
        function isInDrivableArea(x,z){
            const dx=x-carState.x, dz=z-carState.z;
            const cos=Math.cos(carState.rotation), sin=Math.sin(carState.rotation);
            const lx=dx*cos-dz*sin, lz=dx*sin+dz*cos;
            return Math.abs(lx)<=100 && lz>=-50 && lz<=100;
        }
        function createDrivableArea(){
            const shape=new THREE.Shape();
            shape.moveTo(-100,100); shape.lineTo(100,100); shape.lineTo(100,-50); shape.lineTo(-100,-50); shape.lineTo(-100,100);
            const geom=new THREE.ShapeGeometry(shape);
            const mat=new THREE.MeshBasicMaterial({color:0x4D87BA,transparent:true,opacity:0.5,side:THREE.DoubleSide,depthWrite:false});
            const mesh=new THREE.Mesh(geom,mat); mesh.rotation.x=Math.PI/2; mesh.position.y=0.12; mesh.userData.isDrivable=true;
            ROUTE.routeGroup.add(mesh); return mesh;
        }
        function updateDrivableArea(){ if (ROUTE.drivableArea){ ROUTE.drivableArea.position.x=carState.x; ROUTE.drivableArea.position.z=carState.z; ROUTE.drivableArea.rotation.y=carState.rotation; } }

        // ---- Waypoint ----
        function createWaypointMarker(){
            const g=new THREE.Group();
            const head=new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16), new THREE.MeshBasicMaterial({color:0x05AC42}));
            head.position.y=1.2; g.add(head);
            const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1.2,8), new THREE.MeshBasicMaterial({color:0x05AC42}));
            stem.position.y=0.6; g.add(stem);
            const pin=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0,0.6,8), new THREE.MeshBasicMaterial({color:0x05AC42}));
            pin.position.y=0.3; g.add(pin);
            ROUTE.routeGroup.add(g); return g;
        }
        function setWaypoint(pos){
            if (!ROUTE.waypoint) ROUTE.waypoint=createWaypointMarker();
            ROUTE.waypoint.position.set(pos.x,0,pos.z); ROUTE.waypoint.visible=true;
            const graphNode=snapToGraph(pos.x,pos.z); ROUTE.waypoint.userData={pos,graphNode};
            ROUTE.waypointTime=performance.now(); ROUTE.status='selectingRoute';
            logEvent('waypoint_select',{x:pos.x,z:pos.z,dt:(ROUTE.waypointTime-ROUTE.startTime)/1000});
            generateRoutes(); drawRoutes();
            showToast('已生成候选路线', `共 ${ROUTE.routes.length} 条（推荐绿 / 风险橙），悬浮或点击查看`, 10000);
        }
        function deleteWaypoint(){
            if (!ROUTE.waypoint) return;
            ROUTE.routeGroup.remove(ROUTE.waypoint); ROUTE.waypoint=null;
            clearRoutes(); ROUTE.routes=[]; ROUTE.selectedRoute=null; ROUTE.hoveredRoute=null;
            ROUTE.status='selectingWaypoint';

            showToast('已删除途经点','再次鼠标左键点击蓝色区域重新选点', 10000);
        }

        // ---- Route visualization ----
        const raycaster=new THREE.Raycaster();
        const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
        function getMouseWorldPos(e){
            const mouse=new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            raycaster.setFromCamera(mouse,camera); const target=new THREE.Vector3();
            return raycaster.ray.intersectPlane(groundPlane,target) ? {x:target.x,z:target.z} : null;
        }
        function clearRoutes(){
            for (let i=ROUTE.routeGroup.children.length-1;i>=0;i--){ const c=ROUTE.routeGroup.children[i]; if (c.userData && c.userData.isRoute) ROUTE.routeGroup.remove(c); }
            ROUTE.labelGroup.forEach(l=>{ l.label.remove(); if (l.connector) l.connector.remove(); }); ROUTE.labelGroup=[];
        }
        function drawRoutes(){
            clearRoutes();
            ROUTE.routes.forEach((r,idx)=>{
                const pts=r.path.map(p=>new THREE.Vector3(p.x,0.4,p.z));
                const curve=new THREE.CatmullRomCurve3(pts);
                // PRD：实线比 smart path 更粗
                const geom=new THREE.TubeGeometry(curve,Math.max(24,pts.length*2),0.35,10,false);
                const color=r.recommended?0x05AC42:0xCF7432;
                const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.92});
                const mesh=new THREE.Mesh(geom,mat); mesh.userData={isRoute:true,routeIdx:idx};
                ROUTE.routeGroup.add(mesh); r.mesh=mesh;
                // 代价信息框（绿色=推荐仅距离 / 橙色=距离+风险）+ 灰色连线
                const mid=r.path[Math.floor(r.path.length/2)];
                const box=document.createElement('div'); box.className='route-cost '+(r.recommended?'rec':'risk');
                box.innerHTML=`<div class="rc-dist">${rformatDistance(r.dist)}</div>`+(r.risks.length?`<div class="rc-risk">⚠ ${r.risks.join('、')}</div>`:'');
                box.style.pointerEvents='none';
                document.body.appendChild(box);
                const conn=document.createElement('div'); conn.className='route-connector'; document.body.appendChild(conn);
                ROUTE.labelGroup.push({label:box,connector:conn,mid,idx});
            });
        }
        function updateRouteLabels(){
            // 路线代价框：投影到屏幕 + 动态避让（防止重叠）
            const items=ROUTE.labelGroup.map(item=>{
                const p=new THREE.Vector3(item.mid.x,0.5,item.mid.z); p.project(camera);
                const x=(p.x*0.5+0.5)*window.innerWidth; const y=(-p.y*0.5+0.5)*window.innerHeight;
                return {item,x,y,vis:p.z<1};
            });
            items.sort((a,b)=>a.y-b.y);
            for (let i=1;i<items.length;i++){ if (items[i].vis && items[i-1].vis){ const dy=items[i].y-items[i-1].y; if (dy<36 && Math.abs(items[i].x-items[i-1].x)<72) items[i].y=items[i-1].y+36; } }
            items.forEach(o=>{
                const {item,x,y,vis}=o;
                if (!vis){ item.label.style.display='none'; item.connector.style.display='none'; return; }
                item.label.style.display='block';
                const boxH=item.label.offsetHeight||30;
                item.label.style.left=x+'px'; item.label.style.top=(y-60)+'px'; item.label.style.transform='translate(-50%,-100%)';
                item.connector.style.display='block';
                item.connector.style.left=x+'px'; item.connector.style.top=(y-60+boxH)+'px'; item.connector.style.height=Math.max(0,60-boxH)+'px';
            });
            // 删除途经点按钮定位
            const wpBtn=document.getElementById('wp-delete');
            if (ROUTE.waypoint && ROUTE.waypoint.visible){
                const p=new THREE.Vector3(ROUTE.waypoint.position.x,2.2,ROUTE.waypoint.position.z); p.project(camera);
                wpBtn.style.left=((p.x*0.5+0.5)*window.innerWidth)+'px'; wpBtn.style.top=((-p.y*0.5+0.5)*window.innerHeight)+'px';
                wpBtn.classList.remove('hidden');
            } else wpBtn.classList.add('hidden');
        }
        function highlightRoute(idx){
            ROUTE.routes.forEach((r,i)=>{ if (r.mesh) r.mesh.material.opacity=(i===idx||i===ROUTE.selectedRoute)?1:0.3; });
            ROUTE.labelGroup.forEach(l=> l.label.classList.toggle('hl', l.idx===idx || l.idx===ROUTE.selectedRoute));
        }
        function onRouteMouseMove(e){
            if (ROUTE.status!=='selectingRoute') return;
            const mouse=new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            raycaster.setFromCamera(mouse,camera);
            const hits=raycaster.intersectObjects(ROUTE.routeGroup.children).filter(h=>h.object.userData.isRoute);
            if (hits.length){ const idx=hits[0].object.userData.routeIdx; if (ROUTE.hoveredRoute!==idx){ ROUTE.hoveredRoute=idx; highlightRoute(idx); } }
            else if (ROUTE.hoveredRoute!==null){ ROUTE.hoveredRoute=null; highlightRoute(ROUTE.selectedRoute); }
        }
        function onRouteClick(e){
            if (ROUTE.status==='selectingWaypoint'){
                const pos=getMouseWorldPos(e); if (!pos) return;
                if (isInDrivableArea(pos.x,pos.z)) setWaypoint(pos);
                else showToast('请在蓝色可行驶区域内选择', '选择范围：车辆前100 / 左右100 / 后50 米', 10000);
                return;
            }
            if (ROUTE.status==='selectingDestination'){
                const pos=getMouseWorldPos(e); if (!pos) return;
                if (!isInDrivableArea(pos.x,pos.z)){ showToast('新设终点','请在蓝色可行驶区域内点击选择路线终点'); return; }
                ROUTE.destination={x:pos.x,z:pos.z};
                const s=snapToGraph(carState.x,carState.z), d=snapToGraph(pos.x,pos.z);
                const p=dijkstra(s,d);
                if (p.length<2){ showToast('新设终点','所选终点不可达，请重选其他区域'); return; }
                ROUTE.status='selectingWaypoint';
                showToast('新设终点','已选新终点且可达，在蓝色区域内选择途经点（鼠标左键），再次点击途径点可删除。按ESC可退出', 10000);
                return;
            }
            if (ROUTE.status!=='selectingRoute') return;
            const mouse=new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            raycaster.setFromCamera(mouse,camera);
            const hits=raycaster.intersectObjects(ROUTE.routeGroup.children).filter(h=>h.object.userData.isRoute);
            if (hits.length){ selectRoute(hits[0].object.userData.routeIdx); }
        }
        function selectRoute(idx){
            ROUTE.selectedRoute=idx; ROUTE.routeSelectTime=performance.now();
            const r=ROUTE.routes[idx];
            logEvent('route_select',{idx,dist:r.dist,recommended:r.recommended});
            highlightRoute(idx); openConfirmDialog();
        }

        // ---- Confirmation dialog ----
        function openConfirmDialog(){
            const r=ROUTE.routes[ROUTE.selectedRoute];
            document.getElementById('dialog-dist').textContent=rformatDistance(r.dist);
            const riskRow=document.getElementById('dialog-risk-row');
            if (r.risks.length){ riskRow.classList.remove('hidden'); document.getElementById('dialog-risk').textContent=r.risks.join('、'); }
            else riskRow.classList.add('hidden');
            const dlg=document.getElementById('route-dialog');
            dlg.classList.remove('rec','risk'); dlg.classList.add(r.recommended?'rec':'risk');
            dlg.classList.remove('hidden');
        }
        function closeConfirmDialog(){ document.getElementById('route-dialog').classList.add('hidden'); }

        // ---- Auto drive ----
        function startAutoDrive(path){
            ROUTE.autoPath=path.map(p=>({x:p.x,z:p.z}));
            ROUTE.autoIndex=0; ROUTE.autoProgress=0; ROUTE.autoDrive=true;
        }
        function updateAutoDrive(dt){
            if (!ROUTE.autoDrive || ROUTE.autoPath.length<2) return;
            const targetSpeed=40; // km/h
            carState.velocity=THREE.MathUtils.lerp(carState.velocity,targetSpeed,dt*2);
            carState.throttle=30; carState.braking=0;
            const p1=ROUTE.autoPath[ROUTE.autoIndex]; const p2=ROUTE.autoPath[ROUTE.autoIndex+1];
            const dx=p2.x-p1.x, dz=p2.z-p1.z; const segLen=Math.hypot(dx,dz);
            ROUTE.autoProgress+=carState.speedMs*dt;
            if (ROUTE.autoProgress>=segLen){
                ROUTE.autoProgress-=segLen; ROUTE.autoIndex++;
                if (ROUTE.autoIndex>=ROUTE.autoPath.length-1){ ROUTE.autoDrive=false; carState.velocity=0; carState.throttle=0; ROUTE.excludedLane=null; clearRoutes(); ROUTE.routes=[]; showToast('已到达目的地'); return; }
            }
            const t=Math.min(1,ROUTE.autoProgress/segLen);
            carState.x=p1.x+dx*t; carState.z=p1.z+dz*t; carState.rotation=Math.atan2(dx,dz);
            carState.steering=0;
        }

        // ---- Mode management ----
        function hasDrivableArea(){
            // 车辆是否在道路网上（可生成路线）。离最近路节点过远视为黑名单区域
            const idx=snapToGraph(carState.x,carState.z);
            if (idx===-1) return false;
            const n=ROUTE.graph.nodes[idx]; return rdistance({x:carState.x,z:carState.z},n) < 40;
        }
        function enterRouteMode(mode){
            // PRD：进入即判定可行驶性，给出不同反馈
            if (!hasDrivableArea()){
                showToast(mode==='LANE'?'换车道':'新设终点','当前无可行驶区域（车辆在黑名单区域），请挪车至道路后再发起', 10000);
                return;
            }
            if (ROUTE.mode!=='NONE') exitRouteMode('switch');
            ROUTE.mode=mode; ROUTE.startTime=performance.now(); ROUTE.events=[]; ROUTE.autoDrive=false;
            ROUTE.routes=[]; ROUTE.selectedRoute=null; ROUTE.hoveredRoute=null; ROUTE.waypoint=null; ROUTE.destination=null;
            ROUTE.drivableArea=createDrivableArea();
            if (mode==='LANE'){
                ROUTE.status='selectingWaypoint';
                const lane=Math.min(LANE_COUNT-1, Math.max(0, Math.round((carState.x+HALF)/LANE_WIDTH-0.5)));
                const x=-HALF+lane*LANE_WIDTH+LANE_WIDTH/2; ROUTE.destination={x, z:carState.z+400};
                showToast('换车道','在蓝色区域内选择途经点（鼠标左键），再次点击途径点可删除。按ESC可退出', 10000);
            } else {
                ROUTE.status='selectingDestination';
                renderer.domElement.style.cursor='crosshair';
                showToast('新设终点','鼠标左键点击蓝色区域选择路线终点，将替换现有路线终点。按ESC可退出', 10000);
            }
            logEvent('mode_enter',{mode});
            document.getElementById('route-status').textContent=mode==='LANE'?'换车道：选择途经点':'新设终点：选择终点';
            document.getElementById('btn-change-lane').classList.toggle('active',mode==='LANE');
            document.getElementById('btn-new-dest').classList.toggle('active',mode==='DEST');
            updateMetricsPanel();
        }
        function exitRouteMode(reason){
            if (ROUTE.mode==='NONE' && reason!=='dispatch') return;
            if (reason!=='dispatch') clearRoutes();   // 下发后保留路线线作为执行轨迹
            if (ROUTE.drivableArea){ ROUTE.routeGroup.remove(ROUTE.drivableArea); ROUTE.drivableArea=null; }
            if (ROUTE.waypoint){ ROUTE.routeGroup.remove(ROUTE.waypoint); ROUTE.waypoint=null; }
            document.getElementById('wp-delete').classList.add('hidden');
            renderer.domElement.style.cursor='';
            logEvent('mode_exit',{mode:ROUTE.mode,reason});
            ROUTE.mode='NONE'; ROUTE.status='idle'; if (reason!=='dispatch') ROUTE.autoDrive=false; ROUTE.hoveredRoute=null; ROUTE.selectedRoute=null;
            document.getElementById('route-status').textContent='未启动';
            document.getElementById('btn-change-lane').classList.remove('active');
            document.getElementById('btn-new-dest').classList.remove('active');
            closeConfirmDialog();
            updateMetricsPanel();
        }

        // ---- Data collection ----
        function logEvent(type,data){ ROUTE.events.push({type,time:Date.now(),ts:performance.now(),data}); updateMetricsPanel(); }
        function updateMetricsPanel(){
            const last=(type)=>{ const e=ROUTE.events.slice().reverse().find(ev=>ev.type===type); return e?e.ts:null; };
            const enter=last('mode_enter'), wp=last('waypoint_select'), sel=last('route_select'), disp=last('route_dispatch');
            document.getElementById('m-mode-enter').textContent=enter?new Date(enter).toLocaleTimeString():'-';
            document.getElementById('m-waypoint-dt').textContent=enter&&wp?((wp-enter)/1000).toFixed(2)+'s':'-';
            document.getElementById('m-route-dt').textContent=wp&&sel?((sel-wp)/1000).toFixed(2)+'s':'-';
            document.getElementById('m-dispatch-dt').textContent=sel&&disp?((disp-sel)/1000).toFixed(2)+'s':'-';
            const gen=ROUTE.events.filter(e=>e.type==='route_generate').pop();
            document.getElementById('m-route-count').textContent=gen?gen.data.count:'-';
            document.getElementById('m-rec-count').textContent=gen?gen.data.recommended.filter(Boolean).length:'-';
        }
        function exportMetrics(){
            const blob=new Blob([JSON.stringify(ROUTE.events,null,2)],{type:'application/json'});
            const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='route_metrics.json'; a.click(); URL.revokeObjectURL(url);
        }
        let toastTimer=null;
        function showToast(title, detail, ms=10000){
            const t=document.getElementById('toast');
            t.innerHTML=`<div class="toast-title">${title}</div>`+(detail?`<div class="toast-detail">${detail}</div>`:'');
            t.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer=setTimeout(()=>t.classList.remove('show'), ms);
        }

        // ---- Minimap route overlay ----
        function drawRouteOnMiniMap(){
            if (ROUTE.mode==='NONE') return;
            if (ROUTE.drivableArea){
                mapCtx.fillStyle='rgba(77,135,186,0.35)'; const pts=getDrivableWorldPolygon();
                mapCtx.beginPath(); pts.forEach((p,i)=>{ const mx=w2mx(p.x),mz=w2mz(p.z); if (i===0) mapCtx.moveTo(mx,mz); else mapCtx.lineTo(mx,mz); });
                mapCtx.closePath(); mapCtx.fill();
            }
            if (ROUTE.destination){ mapCtx.fillStyle='#CF7432'; const dx=w2mx(ROUTE.destination.x), dz=w2mz(ROUTE.destination.z); mapCtx.beginPath(); mapCtx.arc(dx,dz,4,0,Math.PI*2); mapCtx.fill(); }
            if (ROUTE.waypoint && ROUTE.waypoint.userData && ROUTE.waypoint.userData.pos){
                mapCtx.fillStyle='#05AC42'; const wx=w2mx(ROUTE.waypoint.userData.pos.x), wz=w2mz(ROUTE.waypoint.userData.pos.z);
                mapCtx.beginPath(); mapCtx.arc(wx,wz,4,0,Math.PI*2); mapCtx.fill();
            }
            ROUTE.routes.forEach((r,i)=>{
                const sel=(i===ROUTE.selectedRoute)||(i===ROUTE.hoveredRoute);
                mapCtx.strokeStyle=r.recommended?'#05AC42':'#CF7432'; mapCtx.lineWidth=sel?3:1.5;
                if (!sel && ROUTE.selectedRoute!==null) mapCtx.globalAlpha=0.4;
                mapCtx.beginPath(); r.path.forEach((p,j)=>{ const mx=w2mx(p.x),mz=w2mz(p.z); if (j===0) mapCtx.moveTo(mx,mz); else mapCtx.lineTo(mx,mz); });
                mapCtx.stroke(); mapCtx.globalAlpha=1;
            });
        }

        // ---- Event wiring ----
        document.getElementById('btn-change-lane').addEventListener('click',()=>enterRouteMode('LANE'));
        document.getElementById('btn-new-dest').addEventListener('click',()=>enterRouteMode('DEST'));
        document.getElementById('btn-exit-route').addEventListener('click',()=>exitRouteMode('button'));
        document.getElementById('dialog-confirm').addEventListener('click',()=>{
            const r=ROUTE.routes[ROUTE.selectedRoute]; ROUTE.dispatchTime=performance.now();
            // story 8：记录原车道，本行程内该车道不再作为起点候选
            ROUTE.excludedLane=Math.min(LANE_COUNT-1, Math.max(0, Math.round((carState.x+HALF)/LANE_WIDTH-0.5)));
            logEvent('route_dispatch',{dist:r.dist,recommended:r.recommended,options:{pickup:document.getElementById('opt-pickup').checked,blacklist:document.getElementById('opt-blacklist').checked}});
            closeConfirmDialog(); startAutoDrive(r.path); exitRouteMode('dispatch'); showToast('路线已下发，车辆开始自动驾驶', '', 6000);
        });
        document.getElementById('dialog-cancel').addEventListener('click',closeConfirmDialog);
        document.getElementById('btn-export-metrics').addEventListener('click',exportMetrics);
        renderer.domElement.addEventListener('click',onRouteClick);
        renderer.domElement.addEventListener('mousemove',onRouteMouseMove);
        // PRD：Shift+左键 = 新设终点（直接进入选终点模式）
        renderer.domElement.addEventListener('mousedown',(e)=>{ if (e.shiftKey && ROUTE.mode==='NONE'){ e.preventDefault(); enterRouteMode('DEST'); } });
        document.getElementById('wp-delete').addEventListener('click',deleteWaypoint);

        // ============ HUD ============
        const speedEl=document.getElementById('speed'), throttleEl=document.getElementById('throttle'), steeringEl=document.getElementById('steering'), gearEl=document.getElementById('gear');
        function updateHUD(){ speedEl.textContent=Math.abs(carState.velocity).toFixed(1); throttleEl.textContent=Math.round(carState.throttle); steeringEl.textContent=Math.round(carState.steering); gearEl.textContent=carState.gear===1?'D':'R'; }

        // ============ LOOP ============
        const clock=new THREE.Clock();
        function animate(){
            requestAnimationFrame(animate);
            const dt=Math.min(clock.getDelta(),0.05);
            updateControls(dt); updateTraffic(dt); updateTrafficLights(dt); updateCamera(); updateDrivableArea(); updateAutoDrive(dt); updateHUD(); updateRouteLabels(); drawMiniMap();
            ego.mesh.position.set(carState.x,0,carState.z); ego.mesh.rotation.y=carState.rotation;
            const ws=carState.speedMs*2.5; ego.wheels.forEach(w=>w.rotation.x+=ws*dt); const sa=THREE.MathUtils.degToRad(carState.steering); ego.wheels[0].rotation.y=sa; ego.wheels[1].rotation.y=sa;
            if(ego.mesh.userData.lidarRing&&ego.mesh.userData.lidarRing.visible) ego.mesh.userData.lidarRing.rotation.x+=dt*4;
            egoBox.update(); composer.render();
        }
        document.getElementById('loading').style.opacity='0'; setTimeout(()=>document.getElementById('loading').style.display='none',500);
        window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); composer.setSize(window.innerWidth,window.innerHeight); bloomPass.setSize(window.innerWidth,window.innerHeight); });
        animate();
    </script>
</body>
</html>
